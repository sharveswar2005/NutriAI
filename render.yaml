services:
  - type: web
    name: nutriai-api
    env: python
    region: oregon
    plan: free
    buildCommand: >
      pip install -r requirements.txt &&
      npm install &&
      cd frontend && npm install && npm run build
    startCommand: python -m uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
