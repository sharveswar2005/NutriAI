services:
  # 1. Python Fast API Backend
  - type: web
    name: nutriai-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: nutriai-db
          property: connectionString

databases:
  # 2. PostgreSQL Database
  - name: nutriai-db
    databaseName: nutriai
    user: nutriai_user
    plan: free
